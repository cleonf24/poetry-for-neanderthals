<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry for Neanderthals: Static Edition</title>
    <style>
        :root {
            --bone-white: #f5f1e6;
            --stone-grey: #4a4e5c;
            --dirt-brown: #8b5a2b;
            --slate: #2c3e50;
            --blood-red: #c0392b;
            --leaf-green: #3e8e41;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--slate);
            color: var(--bone-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            background-color: #3e4451;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid var(--dirt-brown);
        }

        h1 { font-size: 2em; margin-bottom: 0.5em; color: var(--dirt-brown); }

        /* Setup Panel */
        #setup-panel {
            background-color: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .setup-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            padding: 8px;
            font-size: 1em;
            background-color: var(--bone-white);
            border: 2px solid var(--stone-grey);
            border-radius: 5px;
            font-family: inherit;
        }

        button {
            font-size: 1em;
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        .btn-primary { background-color: var(--dirt-brown); color: var(--bone-white); }
        .btn-danger { background-color: var(--blood-red); color: var(--bone-white); }
        
        /* Timer */
        #timer-display {
            font-size: 4em;
            font-weight: bold;
            color: var(--bone-white);
            margin: 10px 0;
            text-shadow: 2px 2px 0 #000;
        }

        /* The Card */
        #card {
            background-color: var(--bone-white);
            color: var(--stone-grey);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 8px solid var(--stone-grey);
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none; /* Prevents text highlighting on rapid clicks */
        }

        #card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            border-color: var(--dirt-brown);
        }

        #card:active {
            transform: translateY(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        #card.disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
            pointer-events: none;
            border-color: var(--blood-red);
            transform: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .point-label { font-size: 1.2em; font-weight: bold; color: var(--dirt-brown); margin: 5px 0 0 0;}
        .word-content { font-size: 2.5em; margin: 5px 0 20px 0; color: var(--blood-red); font-weight: bold;}
        .phrase-content { font-size: 2em; margin: 5px 0 10px 0; color: var(--slate); font-weight: bold;}
        
        hr { border: 2px dashed #ccc; width: 80%; margin: 15px auto; }
        #status-message { font-style: italic; color: #aaa; margin-top: 15px; }

    </style>
</head>
<body>

<div id="game-container">
    <h1>Poetry Neanderthal</h1>

    <div id="setup-panel">
        <div class="setup-row">
            <input type="text" id="api-key-input" placeholder="Gemini API Key (Optional)" autocomplete="off">
            <button class="btn-primary" id="save-key-btn">Save</button>
            <button class="btn-danger" id="clear-key-btn">Clear</button>
        </div>
        <div class="setup-row">
            <label for="timer-select">Timer:</label>
            <select id="timer-select">
                <option value="30">30 Seconds</option>
                <option value="60" selected>60 Seconds</option>
                <option value="unlimited">Unlimited</option>
            </select>
            <button class="btn-danger" id="reset-btn">Reset Game</button>
        </div>
    </div>

    <div id="timer-display">60</div>

    <div id="card">
        <div id="card-content">
            <h2 style="font-size: 2.5em; color: var(--slate);">CLICK ME<br>TO START</h2>
            <p>TIMER WILL BEGIN.</p>
        </div>
    </div>

    <p id="status-message">Setup game, then click card to begin.</p>
</div>

<script>
    // --- State Management ---
    const STORAGE_KEY_API_KEY = 'neanderthal_gemini_api_key';
    let userApiKey = localStorage.getItem(STORAGE_KEY_API_KEY) || null;
    
    let timerInterval = null;
    let timeLeft = 60;
    let isGameActive = false;
    let isFetching = false; // Prevent double-clicks during API call

    // --- UI Elements ---
    const elements = {
        apiKeyInput: document.getElementById('api-key-input'),
        saveKeyBtn: document.getElementById('save-key-btn'),
        clearKeyBtn: document.getElementById('clear-key-btn'),
        timerSelect: document.getElementById('timer-select'),
        resetBtn: document.getElementById('reset-btn'),
        status: document.getElementById('status-message'),
        timer: document.getElementById('timer-display'),
        card: document.getElementById('card'),
        cardContent: document.getElementById('card-content')
    };

    // --- Init Setup ---
    if (userApiKey) {
        elements.apiKeyInput.value = userApiKey;
        elements.status.innerText = "API Key active. Ready for real Gemini!";
    }

    // --- Core Logic ---

    // Handle clicking the big card
    async function handleCardClick() {
        if (isFetching) return; // Prevent spamming

        // If game hasn't started, start it
        if (!isGameActive) {
            startGame();
        }

        // Fetch and show next card
        await fetchNewCard();
    }

    function startGame() {
        isGameActive = true;
        const selectedTime = elements.timerSelect.value;
        
        if (selectedTime === 'unlimited') {
            elements.timer.innerText = "∞";
            elements.status.innerText = "Game started (Unlimited time)!";
        } else {
            timeLeft = parseInt(selectedTime);
            elements.timer.innerText = timeLeft;
            elements.status.innerText = "Game started! Talk good!";
            timerInterval = setInterval(updateTimer, 1000);
        }
    }

    function updateTimer() {
        timeLeft--;
        elements.timer.innerText = timeLeft;
        if (timeLeft <= 0) {
            endGame();
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        elements.timer.innerText = "0";
        elements.status.innerText = "TIME UP! Click Reset to play again.";
        
        // "Flip" card back over / disable it
        elements.card.classList.add('disabled');
        elements.cardContent.innerHTML = `
            <h2 style="color: var(--bone-white); font-size: 3em;">TIME UP!</h2>
        `;
    }

    function resetGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        isFetching = false;
        
        // Reset Timer display
        const selectedTime = elements.timerSelect.value;
        elements.timer.innerText = selectedTime === 'unlimited' ? "∞" : selectedTime;
        
        // Reset Card
        elements.card.classList.remove('disabled');
        elements.cardContent.innerHTML = `
            <h2 style="font-size: 2.5em; color: var(--slate);">CLICK ME<br>TO START</h2>
            <p>TIMER WILL BEGIN.</p>
        `;
        
        elements.status.innerText = "Game reset. Ready to play.";
    }

    // --- Fetching Data ---
    async function fetchNewCard() {
        isFetching = true;
        
        // Show loading state on card
        elements.cardContent.innerHTML = `<h2 style="color: var(--slate);">...THINKING...</h2>`;

        if (!userApiKey) {
            // Use Mock Data
            setTimeout(() => {
                displayCard(getMockData());
                isFetching = false;
            }, 300); // Tiny artificial delay for feel
            return;
        }

        // --- REAL GEMINI INTEGRATION ---
        const geminiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${userApiKey}`;
        
        const promptText = "Generate a single 'Poetry for Neanderthals' game card. Return ONLY a valid JSON object. Do not include markdown formatting or backticks. The JSON must have two keys: 'one_point_word' (a single common noun/item) and 'three_point_phrase' (a 2-3 word specific version of that item). Examples: {'one_point_word': 'Bear', 'three_point_phrase': 'Polar Bear'}, {'one_point_word': 'Car', 'three_point_phrase': 'Race Car'}. Make it suitable for a party game.";

        const requestOptions = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        };

        try {
            const response = await fetch(geminiEndpoint, requestOptions);
            const result = await response.json();
            
            let textResponse = result.candidates[0].content.parts[0].text;
            
            // Clean up potential markdown formatting from Gemini
            textResponse = textResponse.replace(/```json/gi, '').replace(/```/g, '').trim();
            
            const cardJson = JSON.parse(textResponse);

            if (cardJson.one_point_word && cardJson.three_point_phrase) {
                displayCard(cardJson);
            } else {
                throw new Error("Invalid response keys.");
            }

        } catch (error) {
            console.error("Gemini Error:", error);
            elements.status.innerText = "API Error. Falling back to built-in words.";
            displayCard(getMockData());
        } finally {
            isFetching = false;
        }
    }

    // Render the card HTML
    function displayCard(data) {
        elements.cardContent.innerHTML = `
            <p class="point-label">1 POINT:</p>
            <div class="word-content">${data.one_point_word}</div>
            <hr>
            <p class="point-label">3 POINTS:</p>
            <div class="phrase-content">${data.three_point_phrase}</div>
        `;
    }

    // --- Utility/Mock Data ---
    function getMockData() {
        const mockCards = [
            { one_point_word: "SHOE", three_point_phrase: "RUNNING SHOE" },
            { one_point_word: "BEAR", three_point_phrase: "POLAR BEAR" },
            { one_point_word: "FIRE", three_point_phrase: "CAMP FIRE" },
            { one_point_word: "BIRD", three_point_phrase: "BALD EAGLE" },
            { one_point_word: "WATER", three_point_phrase: "SWIMMING POOL" },
            { one_point_word: "STAR", three_point_phrase: "SHOOTING STAR" },
            { one_point_word: "CAR", three_point_phrase: "POLICE CAR" }
        ];
        return mockCards[Math.floor(Math.random() * mockCards.length)];
    }

    // --- Event Listeners ---
    elements.card.addEventListener('click', handleCardClick);
    elements.resetBtn.addEventListener('click', resetGame);
    
    // Update timer display immediately when dropdown changes (if game not active)
    elements.timerSelect.addEventListener('change', () => {
        if (!isGameActive) {
            const val = elements.timerSelect.value;
            elements.timer.innerText = val === 'unlimited' ? "∞" : val;
        }
    });

    // API Key Management
    elements.saveKeyBtn.addEventListener('click', () => {
        userApiKey = elements.apiKeyInput.value.trim();
        if (userApiKey) {
            localStorage.setItem(STORAGE_KEY_API_KEY, userApiKey);
            elements.status.innerText = "Key Saved!";
        }
    });

    elements.clearKeyBtn.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY_API_KEY);
        userApiKey = null;
        elements.apiKeyInput.value = '';
        elements.status.innerText = "Key Cleared. Using mock data.";
    });

</script>
</body>
</html>
